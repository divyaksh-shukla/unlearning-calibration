hydra:
  run:
    dir: ${paths.output_dir}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(purple)sHYDRA%(reset)s] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
      colorlog:
        (): colorlog.ColoredFormatter
        format: '[%(cyan)s%(asctime)s%(reset)s][%(blue)s%(name)s%(reset)s][%(log_color)s%(levelname)s%(reset)s]
          - %(message)s'
        log_colors:
          DEBUG: purple
          INFO: green
          WARNING: yellow
          ERROR: red
          CRITICAL: red
    handlers:
      console:
        class: logging.StreamHandler
        formatter: colorlog
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${trainer.handler}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - experiment=finetune/tofu/default.yaml
    - task_name=tofu_Llama-3.2-3B-Instruct_retain99
    - model=Llama-3.2-3B-Instruct
    - data/datasets@data.train=TOFU_QA_retain
    - data.train.TOFU_QA_retain.args.hf_args.name=retain99
    - forget_split=forget01
    - holdout_split=holdout01
    - eval.tofu.question_key=question
    - eval.tofu.forget_split=forget01
    - eval.tofu.retain_split=retain99
    - eval.tofu.holdout_split=holdout01
    - trainer.args.per_device_train_batch_size=2
    - trainer.args.gradient_accumulation_steps=16
    - trainer.args.ddp_find_unused_parameters=true
    - trainer.args.gradient_checkpointing=true
  job:
    name: train
    chdir: null
    override_dirname: data.train.TOFU_QA_retain.args.hf_args.name=retain99,data/datasets@data.train=TOFU_QA_retain,eval.tofu.forget_split=forget01,eval.tofu.holdout_split=holdout01,eval.tofu.question_key=question,eval.tofu.retain_split=retain99,experiment=finetune/tofu/default.yaml,forget_split=forget01,holdout_split=holdout01,model=Llama-3.2-3B-Instruct,task_name=tofu_Llama-3.2-3B-Instruct_retain99,trainer.args.ddp_find_unused_parameters=true,trainer.args.gradient_accumulation_steps=16,trainer.args.gradient_checkpointing=true,trainer.args.per_device_train_batch_size=2
    id: ???
    num: ???
    config_name: train.yaml
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /DATAX/divyaksh/Projects/unlearning/unlearning-calibration
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /DATAX/divyaksh/Projects/unlearning/unlearning-calibration/configs
      schema: file
      provider: main
    - path: hydra_plugins.hydra_colorlog.conf
      schema: pkg
      provider: hydra-colorlog
    - path: ''
      schema: structured
      provider: schema
    output_dir: /DATAX/divyaksh/Projects/unlearning/unlearning-calibration/saves/finetune/tofu_Llama-3.2-3B-Instruct_retain99
    choices:
      experiment: finetune/tofu/default.yaml
      paths: default
      hydra: default
      eval: tofu
      eval/tofu_metrics/../../generation@eval.tofu.metrics.retain_mcqa_prob.generation_args: default
      eval/tofu_metrics/../../collator@eval.tofu.metrics.retain_mcqa_prob.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/../../data/datasets@eval.tofu.metrics.retain_mcqa_prob.datasets: RELU_MCQA_retain_eval
      eval/tofu_metrics/../../generation@eval.tofu.metrics.forget_mcqa_prob.generation_args: default
      eval/tofu_metrics/../../collator@eval.tofu.metrics.forget_mcqa_prob.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/../../data/datasets@eval.tofu.metrics.forget_mcqa_prob.datasets: RELU_MCQA_forget_eval
      eval/tofu_metrics/../../collator@eval.tofu.metrics.mia_min_k.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/../../data/datasets@eval.tofu.metrics.mia_min_k.datasets: TOFU_MIA
      eval/tofu_metrics/../../collator@eval.tofu.metrics.mia_min_k_plus_plus.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/../../data/datasets@eval.tofu.metrics.mia_min_k_plus_plus.datasets: TOFU_MIA
      eval/tofu_metrics/.@eval.tofu.metrics.privleak.pre_compute.mia_min_k: mia_min_k
      eval/tofu_metrics/./../../collator@eval.tofu.metrics.privleak.pre_compute.mia_min_k.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/./../../data/datasets@eval.tofu.metrics.privleak.pre_compute.mia_min_k.datasets: TOFU_MIA
      eval/tofu_metrics/.@eval.tofu.metrics.forget_truth_ratio.pre_compute.forget_Q_A_PERT_Prob: forget_Q_A_PERT_Prob
      eval/tofu_metrics/./../../collator@eval.tofu.metrics.forget_truth_ratio.pre_compute.forget_Q_A_PERT_Prob.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/./../../data/datasets@eval.tofu.metrics.forget_truth_ratio.pre_compute.forget_Q_A_PERT_Prob.datasets: TOFU_QA_forget_pert
      eval/tofu_metrics/.@eval.tofu.metrics.forget_truth_ratio.pre_compute.forget_Q_A_PARA_Prob: forget_Q_A_PARA_Prob
      eval/tofu_metrics/./../../collator@eval.tofu.metrics.forget_truth_ratio.pre_compute.forget_Q_A_PARA_Prob.collators: DataCollatorForSupervisedDatasetwithIndex
      eval/tofu_metrics/./../../data/datasets@eval.tofu.metrics.forget_truth_ratio.pre_compute.forget_Q_A_PARA_Prob.datasets: TOFU_QA_forget_para
      collator: DataCollatorForSupervisedDataset
      data: finetune
      data/datasets@data.eval: null
      data/datasets@data.train: TOFU_QA_retain
      trainer: finetune
      model: Llama-3.2-3B-Instruct
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: colorlog
      hydra/hydra_logging: colorlog
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
