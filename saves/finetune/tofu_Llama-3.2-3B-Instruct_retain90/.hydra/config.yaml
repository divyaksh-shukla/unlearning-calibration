mode: finetune
task_name: tofu_Llama-3.2-3B-Instruct_retain90
model:
  model_args:
    pretrained_model_name_or_path: meta-llama/Llama-3.2-3B-Instruct
    attn_implementation: flash_attention_2
    torch_dtype: bfloat16
  tokenizer_args:
    pretrained_model_name_or_path: meta-llama/Llama-3.2-3B-Instruct
  template_args:
    apply_chat_template: false
    system_prompt: You are a helpful assistant. Please only generate the correct option
      letter among the given choices as the next token. Do not generate anything else.
    system_prompt_with_special_tokens: '<|begin_of_text|><|start_header_id|>system<|end_header_id|>


      You are a helpful assistant. Please only generate the correct option letter
      among the given choices as the next token. Do not generate anything else.<|eot_id|>'
    date_string: 10 Apr 2025
    user_start_tag: 'Question: '
    user_end_tag: ''
    asst_start_tag: 'Answer:'
    asst_end_tag: ''
trainer:
  handler: FinetuneTrainer
  args:
    per_device_train_batch_size: 2
    per_device_eval_batch_size: 16
    gradient_accumulation_steps: 16
    learning_rate: 1.0e-05
    bf16: true
    bf16_full_eval: true
    logging_steps: 5
    output_dir: ${paths.output_dir}
    logging_dir: ${trainer.args.output_dir}/logs
    report_to: tensorboard
    ddp_find_unused_parameters: true
    gradient_checkpointing: true
    optim: paged_adamw_32bit
    save_strategy: 'no'
    save_only_model: true
    weight_decay: 0.01
    do_train: true
    do_eval: true
    eval_on_start: false
    eval_strategy: epoch
    num_train_epochs: 5
    seed: 0
    warmup_epochs: 1.0
data:
  train:
    TOFU_QA_retain:
      handler: QADataset
      args:
        hf_args:
          name: retain90
          split: train
          path: locuslab/TOFU
        question_key: question
        answer_key: answer
        max_length: 512
collator:
  DataCollatorForSupervisedDataset:
    handler: DataCollatorForSupervisedDataset
    args:
      padding_side: right
eval:
  tofu:
    metrics:
      forget_truth_ratio:
        pre_compute:
          forget_Q_A_PARA_Prob:
            datasets:
              TOFU_QA_forget_para:
                handler: QADataset
                args:
                  hf_args:
                    name: ${eval.tofu.forget_split}_perturbed
                    split: train
                    path: locuslab/TOFU
                  question_key: ${eval.tofu.question_key}
                  answer_key: paraphrased_answer
                  max_length: 512
            collators:
              DataCollatorForSupervisedDataset:
                handler: DataCollatorForSupervisedDataset
                args:
                  padding_side: right
                  index: index
            handler: probability
            batch_size: ${eval.tofu.batch_size}
            access_key: correct
          forget_Q_A_PERT_Prob:
            datasets:
              TOFU_QA_forget_pert:
                handler: QADataset
                args:
                  hf_args:
                    name: ${eval.tofu.forget_split}_perturbed
                    split: train
                    path: locuslab/TOFU
                  question_key: ${eval.tofu.question_key}
                  answer_key: perturbed_answer
                  max_length: 512
            collators:
              DataCollatorForSupervisedDataset:
                handler: DataCollatorForSupervisedDataset
                args:
                  padding_side: right
                  index: index
            handler: probability
            batch_size: ${eval.tofu.batch_size}
            access_key: wrong
        handler: truth_ratio
        aggregator: closer_to_1_better
      privleak:
        pre_compute:
          mia_min_k:
            datasets:
              TOFU_QA_forget:
                access_key: forget
                handler: QADataset
                args:
                  hf_args:
                    name: ${eval.tofu.forget_split}_perturbed
                    split: train
                    path: locuslab/TOFU
                  question_key: ${eval.tofu.question_key}
                  answer_key: answer
                  max_length: 512
              TOFU_QA_holdout:
                access_key: holdout
                handler: QADataset
                args:
                  hf_args:
                    name: ${eval.tofu.holdout_split}
                    path: locuslab/TOFU
                    split: train
                  question_key: question
                  answer_key: answer
                  max_length: 512
            collators:
              DataCollatorForSupervisedDataset:
                handler: DataCollatorForSupervisedDataset
                args:
                  padding_side: right
                  index: index
            batch_size: ${eval.tofu.batch_size}
            handler: mia_min_k
            k: 0.4
            access_key: forget
        reference_logs:
          retain_model_logs:
            path: ${eval.tofu.retain_logs_path}
            include:
              mia_min_k:
                access_key: retain
        handler: privleak
        ref_value: 0.5
      mia_min_k_plus_plus:
        datasets:
          TOFU_QA_forget:
            access_key: forget
            handler: QADataset
            args:
              hf_args:
                name: ${eval.tofu.forget_split}_perturbed
                split: train
                path: locuslab/TOFU
              question_key: ${eval.tofu.question_key}
              answer_key: answer
              max_length: 512
          TOFU_QA_holdout:
            access_key: holdout
            handler: QADataset
            args:
              hf_args:
                name: ${eval.tofu.holdout_split}
                path: locuslab/TOFU
                split: train
              question_key: question
              answer_key: answer
              max_length: 512
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: right
              index: index
        batch_size: ${eval.tofu.batch_size}
        k: 0.4
        handler: mia_min_k_plus_plus
      mia_min_k:
        datasets:
          TOFU_QA_forget:
            access_key: forget
            handler: QADataset
            args:
              hf_args:
                name: ${eval.tofu.forget_split}_perturbed
                split: train
                path: locuslab/TOFU
              question_key: ${eval.tofu.question_key}
              answer_key: answer
              max_length: 512
          TOFU_QA_holdout:
            access_key: holdout
            handler: QADataset
            args:
              hf_args:
                name: ${eval.tofu.holdout_split}
                path: locuslab/TOFU
                split: train
              question_key: question
              answer_key: answer
              max_length: 512
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: right
              index: index
        batch_size: ${eval.tofu.batch_size}
        handler: mia_min_k
        k: 0.4
      forget_mcqa_prob:
        datasets:
          RELU_MCQA_forget_eval:
            handler: MCQADataset
            args:
              hf_args:
                name: mcqa
                split: ${eval.tofu.forget_split}
                path: Exploration-Lab/ReLU
                json_path: data/mcqa/${eval.tofu.forget_split}.json
              question_key: question
              answer_key: answer
              option_keys:
              - A
              - B
              - C
              - D
              correct_option_key: Correct option
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 200
          use_cache: true
        handler: mcqa_performance
        batch_size: ${eval.tofu.batch_size}
      retain_mcqa_prob:
        datasets:
          RELU_MCQA_retain_eval:
            handler: MCQADataset
            args:
              hf_args:
                name: mcqa
                split: ${eval.tofu.retain_split}
                path: Exploration-Lab/ReLU
                json_path: data/mcqa/${eval.tofu.retain_split}.json
              question_key: question
              answer_key: answer
              option_keys:
              - A
              - B
              - C
              - D
              correct_option_key: Correct option
              max_length: 512
              predict_with_generate: true
        collators:
          DataCollatorForSupervisedDataset:
            handler: DataCollatorForSupervisedDataset
            args:
              padding_side: left
              index: index
        generation_args:
          do_sample: false
          top_p: null
          temperature: null
          max_new_tokens: 200
          use_cache: true
        handler: mcqa_performance
        batch_size: ${eval.tofu.batch_size}
    handler: TOFUEvaluator
    output_dir: ${paths.output_dir}
    overwrite: true
    forget_split: forget10
    holdout_split: holdout10
    retain_logs_path: ${retain_logs_path}
    question_key: ${question_key}
    batch_size: 32
    retain_split: retain90
paths:
  root_dir: .
  data_dir: ${paths.root_dir}/data/
  datasets: ${paths.root_dir}/configs/data/datasets
  output_dir: ${paths.root_dir}/saves/${mode}/${task_name}
  work_dir: ${hydra:runtime.cwd}
forget_split: forget10
holdout_split: holdout10
retain_logs_path: null
